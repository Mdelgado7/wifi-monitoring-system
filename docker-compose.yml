services:

  wifi-agent:
    build: ./services/wifi-agent
    container_name: wifi-agent
    network_mode: "host"
    privileged: true
    volumes:
      - ./logs:/logs

  exporter:
    build: ./services/exporter
    container_name: exporter
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/logs

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
